<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
body{
    font-family:Arial, sans-serif;
    margin:0;
    background:#f5f5f5;
}

.header{
    background:#2c3e50;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:white;
    font-size:24px;
    font-weight:bold;
}

.menu ul{
    list-style:none;
    margin:0;
    padding:0;
}

.menu li{
    display:inline-block;
    margin-left:20px;
}

.menu a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.menu a:hover{
    color:orange;
}

.contact-container{
    width:80%;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.contact-container h2{
    text-align:center;
    color:#2c3e50;
}

input,textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#2c3e50;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#34495e;
}

.info{
    text-align:center;
    margin-top:25px;
}

.footer{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:20px;
}

@media(max-width:768px){

.header{
    flex-direction:column;
}

.menu li{
    display:block;
    margin:10px 0;
    text-align:center;
}

.contact-container{
    width:95%;
}
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">Fashion Hub</div>

    <div class="menu">
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </div>
</div>

<div class="contact-container">

    <h2>Contact Us</h2>

    <form>
        <input type="text" placeholder="Enter Your Name">

        <input type="email" placeholder="Enter Your Email">

        <input type="tel" placeholder="Enter Mobile Number">

        <textarea rows="5" placeholder="Enter Your Message"></textarea>

        <button type="submit">Send Message</button>
    </form>

    <div class="info">
        <h3>Fashion Hub</h3>
        <p>📍 Kolhapur, Maharashtra</p>
        <p>📞 +91 9876543210</p>
        <p>✉ fashionworld@gmail.com</p>
    </div>

</div>

<div class="footer">
    © 2026 Fashion world | All Rights Reserved
</div>

</body>
</html>
